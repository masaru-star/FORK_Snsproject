<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snsproject</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>Snsproject</h1>
    </header>

    <div class="announcement">
      <i data-lucide="megaphone" size="18"></i>
      <span>簡易的な端末ブロック機能を実装しています。</span>
    </div>
    <div class="terms-link">
        <a href="about.html">利用前に必ず利用規約を<b>ご確認ください</b>。</a>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" onclick="switchTab('tab-view')">
        <i data-lucide="message-square" size="18"></i>投稿一覧
      </button>
      <button class="tab-btn" onclick="switchTab('tab-post')">
        <i data-lucide="pen-tool" size="18"></i>投稿する
      </button>
      <button class="tab-btn" onclick="switchTab('tab-user')">
        <i data-lucide="user-plus" size="18"></i>登録
      </button>
    </nav>

    <div id="tab-view" class="card active">
      <div class="refresh-area">
          <button class="btn-refresh" onclick="loadPosts()">
              <i data-lucide="rotate-cw" size="16"></i>更新
          </button>
      </div>
      <ul id="posts">
      </ul>
    </div>

    <!-- 投稿フォーム -->
    <div id="tab-post" class="card">
      <div class="form-group">
        <label>ユーザー名</label>
        <input type="text" id="name" placeholder="登録した名前" />
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>メッセージ</label>
        <textarea id="message" placeholder="いまどうしてる？" rows="5"></textarea>
        <span id="char-count"></span>
      </div>
      <button class="btn-primary" onclick="postMessage()">
        <i data-lucide="send" size="18"></i>投稿する
      </button>
      <p id="status" class="status-msg"></p>
    </div>

    <!-- ユーザー登録 -->
    <div id="tab-user" class="card">
      <div class="form-group">
        <label>希望するユーザー名</label>
        <input type="text" id="reg_name" placeholder="ニックネームなど" />
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="reg_password" placeholder="パスワードを設定" />
      </div>
      <button class="btn-primary" onclick="registerUser()">
        <i data-lucide="user-plus" size="18"></i>新しく登録する
      </button>
      <p id="reg_status" class="status-msg"></p>
    </div>
  </div>
